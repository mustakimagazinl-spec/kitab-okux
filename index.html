const PALETTES = [

  {bg:'#E1F5EE',border:'#5DCAA5',avatar:'#9FE1CB',avatarText:'#085041',metric:'#0F6E56',metricLight:'#E1F5EE'},

  {bg:'#FAEEDA',border:'#EF9F27',avatar:'#FAC775',avatarText:'#633806',metric:'#BA7517',metricLight:'#FAEEDA'},
  {bg:'#FBEAF0',border:'#ED93B1',avatar:'#F4C0D1',avatarText:'#72243E',metric:'#993556',metricLight:'#FBEAF0'},
  {bg:'#F1EFE8',border:'#B4B2A9',avatar:'#D3D1C7',avatarText:'#444441',metric:'#5F5E5A',metricLight:'#F1EFE8'},
];

let STATE = { persons:[], entries:[], cycles:[], activeCycle:null };

async function loadAll() {
  const [pS,eS,cS,aS] = await Promise.all([
    getDoc(doc(db,'app','persons')),
    getDoc(doc(db,'app','entries')),
    getDoc(doc(db,'app','cycles')),
    getDoc(doc(db,'app','activeCycle')),
  ]);
  STATE.persons     = pS.exists() ? pS.data().list  || [] : [];
  STATE.entries     = eS.exists() ? eS.data().list  || [] : [];
  STATE.cycles      = cS.exists() ? cS.data().list  || [] : [];
  STATE.activeCycle = aS.exists() ? aS.data().value || null : null;
}

async function savePersons()     { await setDoc(doc(db,'app','persons'),     {list: STATE.persons}); }
async function saveEntries()     { await setDoc(doc(db,'app','entries'),     {list: STATE.entries}); }
async function saveCycles()      { await setDoc(doc(db,'app','cycles'),      {list: STATE.cycles});  }
async function saveActiveCycle() { await setDoc(doc(db,'app','activeCycle'), {value: STATE.activeCycle}); }

function today() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function initials(n) { return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function pal(i) { return PALETTES[i % PALETTES.length]; }
function daysBetween(a,b) { return Math.round((new Date(b)-new Date(a))/86400000); }

function calcStreak(person) {
  const cycle = STATE.activeCycle;
  const dates = [...new Set(STATE.entries.filter(e=>e.person===person&&(!cycle||e.cycleId===cycle.id)).map(e=>e.date))].sort().reverse();
  if (!dates.length) return 0;
  let streak=0, cur=new Date(today());
  for (let d of dates) {
    const diff = Math.round((cur-new Date(d))/86400000);
    if (diff===streak) { streak++; cur=new Date(d); } else if (diff>1) break;
  }
  return streak;
}

function isInactive(person) {
  const cycle = STATE.activeCycle;
  const last = STATE.entries.filter(e=>e.person===person&&(!cycle||e.cycleId===cycle.id)).map(e=>e.date).sort().pop();
  if (!last) return true;
  return daysBetween(last,today()) >= INACTIVE_DAYS;
}

function show(id) {
  ['view-home','view-participant','view-admin-pin','view-admin'].forEach(v=>{
    document.getElementById(v).style.display = v===id?'':'none';
  });
}
function setHTML(id,html) { document.getElementById(id).innerHTML = html; }

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome() {
  const cycle = STATE.activeCycle;
  let html = `<div style="text-align:center;padding:1.5rem 0 1rem">
    <div style="font-size:26px;font-weight:600;color:#534AB7;margin-bottom:4px">كىتاب ئوقۇش خاتىرىسى</div>
    <div style="font-size:13px;color:#888">${today()}</div>
  </div>`;

  html += cycle
    ? `<div style="background:#E1F5EE;border:0.5px solid #5DCAA5;border-radius:12px;padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div><span style="font-weight:500;color:#085041">چەمبەر: </span><span style="color:#085041">${cycle.name}</span></div>
        <div style="font-size:12px;color:#0F6E56">${cycle.start} — داۋام ئەتمەكتە</div>

    : `<div style="background:#FAEEDA;border:0.5px solid #EF9F27;border-radius:12px;padding:12px 16px;margin-bottom:1rem;color:#633806">ھازىر پائال چەمبەر يوق. باشقۇرغۇچىغا مۇراجىئەت قىلىڭ.</div>`;

  html += `<div style="font-size:14px;font-weight:500;color:#888;margin-bottom:12px">ئۆزىڭىزنى تاللاڭ</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:2rem">`;

  STATE.persons.forEach((p,i) => {
    const pl = pal(i);
    const inactive = isInactive(p.name);
    const streak = calcStreak(p.name);
    html += `<div onclick="openParticipant('${p.name.replace(/'/g,"\\'")}','${i}')"
      style="background:${pl.bg};border:1.5px solid ${pl.border};border-radius:14px;padding:1rem;cursor:pointer;transition:transform .1s"
      onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:36px;height:36px;border-radius:50%;background:${pl.avatar};color:${pl.avatarText};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500">${initials(p.name)}</div>
        <div style="font-weight:500;font-size:14px;color:${pl.avatarText};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>
      </div>
      ${p.book?`<div style="font-size:11px;color:${pl.metric};margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">&#128214; ${p.book}</div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${inactive
          ?`<span style="background:#FCEBEB;color:#A32D2D;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:500">ھەركەتسىز</span>`
          :`<span style="background:#EAF3DE;color:#3B6D11;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:500">ئاكتىپ</span>`}
        ${streak>=2?`<span style="background:${pl.metricLight};color:${pl.metric};border-radius:20px;padding:2px 8px;font-size:11px;font-weight:500">${streak} كۈن</span>`:''}
      </div>
    </div>`;
  });

  html += `</div>
  <div style="text-align:center;padding-top:1rem;border-top:0.5px solid #eee">
    <button onclick="openAdminPin()" style="background:none;border:0.5px solid #ddd;border-radius:8px;padding:8px 20px;font-size:13px;color:#888;cursor:pointer">باشقۇرغۇچى كىرىش</button>
  </div>`;

  setHTML('view-home',html);
  show('view-home');
}

// ── PARTICIPANT ────────────────────────────────────────────────────────────────
window.openParticipant = function(name, idxStr) {
  renderParticipant(name, parseInt(idxStr));
  show('view-participant');
};

function renderParticipant(name, idx) {
  if (idx === undefined) idx = STATE.persons.findIndex(p=>p.name===name);
  const person = STATE.persons[idx] || {name,book:''};
  const pl = pal(idx);
  const cycle = STATE.activeCycle;
  const myEntries = STATE.entries.filter(e=>e.person===name&&(!cycle||e.cycleId===cycle.id));
  const todayEntry = myEntries.find(e=>e.date===today());
  const totalPages = myEntries.reduce((s,e)=>s+e.pages,0);
  const streak = calcStreak(name);
  const activeDays = new Set(myEntries.map(e=>e.date)).size;

  let html = `<div style="background:${pl.bg};border-bottom:2px solid ${pl.border};padding:1.25rem;border-radius:14px 14px 0 0">
    <button onclick="goHome()" style="background:${pl.avatar};border:none;color:${pl.avatarText};border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;margin-bottom:12px">&#8592; قايتىش</button>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:54px;height:54px;border-radius:50%;background:${pl.avatar};color:${pl.avatarText};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:500">${initials(name)}</div>
      <div>
        <div style="font-size:21px;font-weight:600;color:${pl.avatarText}">${name}</div>
        <div style="font-size:13px;color:${pl.metric}">${person.book?'كىتاب: '+person.book:'كىتاب تەييارلانمىغان'}</div>
      </div>
    </div>
  </div>
  <div style="background:#fff;border:0.5px solid #eee;border-top:none;border-radius:0 0 14px 14px;padding:1.25rem;margin-bottom:1rem">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem">
      <div style="background:${pl.bg};border-radius:10px;padding:12px"><div style="font-size:11px;color:${pl.metric};font-weight:500;margin-bottom:3px">ئومۇمىي بەت</div><div style="font-size:22px;font-weight:600;color:${pl.avatarText}">${totalPages}</div></div>
      <div style="background:${pl.bg};border-radius:10px;padding:12px"><div style="font-size:11px;color:${pl.metric};font-weight:500;margin-bottom:3px">ئاكتىپ كۈن</div><div style="font-size:22px;font-weight:600;color:${pl.avatarText}">${activeDays}</div></div>
      <div style="background:${pl.bg};border-radius:10px;padding:12px"><div style="font-size:11px;color:${pl.metric};font-weight:500;margin-bottom:3px">رەت سانى</div><div style="font-size:22px;font-weight:600;color:${pl.avatarText}">${streak}</div></div>
    </div>`;

  if (!cycle) {
    html += `<div style="background:#FAEEDA;border-radius:10px;padding:10px 14px;color:#633806;font-size:13px">ھازىر پائال چەمبەر يوق.</div>`;
  } else {
    if (todayEntry) {
      html += `<div style="background:#EAF3DE;border-radius:10px;padding:10px 14px;color:#27500A;font-size:13px;margin-bottom:12px">بۈگۈن خاتىرىلەندى: <strong>${todayEntry.pages} بەت</strong></div>`;
    }
    html += `<div style="font-size:14px;font-weight:500;color:${pl.avatarText};margin-bottom:10px">${todayEntry?'خاتىرىنى ئۆزگەرتىش':'بۈگۈن ئوقۇغان بەت سانىنى كىرگۈزۈڭ'}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div style="flex:1;min-width:110px">
        <label style="font-size:12px;color:${pl.metric};display:block;margin-bottom:4px">بەت سانى</label>
        <input type="number" id="pp-pages" min="1" placeholder="مەسىلەن: 35" value="${todayEntry?todayEntry.pages:''}"
          style="width:100%;padding:8px 10px;border:1.5px solid ${pl.border};border-radius:8px;font-size:15px;background:${pl.bg};color:${pl.avatarText}" />
      </div>
      <div style="min-width:160px">
        <label style="font-size:12px;color:${pl.metric};display:block;margin-bottom:4px">كۈن</label>
        <input type="date" id="pp-date" value="${today()}"
          style="width:100%;padding:8px 10px;border:1.5px solid ${pl.border};border-radius:8px;font-size:14px;background:${pl.bg};color:${pl.avatarText}" />
      </div>
      <button onclick="submitReading('${name.replace(/'/g,"\\'")}',${idx})"
        style="background:${pl.metric};color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:14px;cursor:pointer;font-weight:500">ساقلاش</button>
    </div>
    <div id="pp-msg" style="font-size:13px;margin-top:8px;display:none"></div>`;
  }
  html += `</div>`;

  // Recent entries with edit/delete
  if (myEntries.length) {
    const sorted = myEntries.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
    html += `<div style="background:#fff;border:0.5px solid #eee;border-radius:14px;padding:1.25rem">
      <div style="font-size:14px;font-weight:500;color:${pl.metric};margin-bottom:10px">ئاخىرقى خاتىرىلەر</div>
      <div id="pp-entries-list">`;
    sorted.forEach((e,ei) => {
      const gIdx = STATE.entries.findIndex(x=>x.person===e.person&&x.date===e.date&&x.cycleId===e.cycleId&&x.pages===e.pages);
      html += `<div id="pp-row-${ei}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${pl.bg};border-radius:8px;margin-bottom:6px;font-size:13px">
        <span style="color:${pl.avatarText};min-width:95px">${e.date}</span>
        <span style="font-weight:600;color:${pl.metric};flex:1">${e.pages} بەت</span>
        <button onclick="ppEditRow(${ei},${gIdx},'${name.replace(/'/g,"\\'")}',${idx})"
          style="background:none;border:0.5px solid ${pl.border};border-radius:6px;padding:4px 10px;font-size:11px;color:${pl.metric};cursor:pointer">تەھرىر</button>
        <button onclick="ppDeleteEntry(${gIdx},'${name.replace(/'/g,"\\'")}',${idx})"
          style="background:none;border:0.5px solid #F0957580;border-radius:6px;padding:4px 10px;font-size:11px;color:#A32D2D;cursor:pointer">ئۆچۈر</button>
      </div>`;
    });
    html += `</div></div>`;
  }

  setHTML('view-participant', html);
  window._ppName = name;
  window._ppIdx = idx;
}

window.ppEditRow = function(ei, gIdx, name, idx) {
  const e = STATE.entries[gIdx];
  if (!e) return;
  const pl = pal(idx);
  const row = document.getElementById('pp-row-'+ei);
  row.innerHTML = `
    <span style="color:${pl.avatarText};min-width:95px">${e.date}</span>
    <input type="number" id="pp-inline-${ei}" value="${e.pages}" min="1"
      style="width:75px;padding:4px 8px;border:1.5px solid ${pl.metric};border-radius:6px;font-size:13px;background:${pl.bg};color:${pl.avatarText}" />
    <span style="font-size:12px;color:${pl.metric}">بەت</span>
    <button onclick="ppSaveRow(${ei},${gIdx},'${name.replace(/'/g,"\\'")}',${idx})"
      style="background:${pl.metric};color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer">ساقلاش</button>
    <button onclick="renderParticipant('${name.replace(/'/g,"\\'")}',${idx})"
      style="background:none;border:0.5px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:#888">بىكار</button>`;
};

window.ppSaveRow = async function(ei, gIdx, name, idx) {
  const val = parseInt(document.getElementById('pp-inline-'+ei)?.value);
  if (!val||val<1) { alert('توغرا بەت سانى كىرگۈزۈڭ.'); return; }
  STATE.entries[gIdx].pages = val;
  await saveEntries();
  renderParticipant(name, idx);
};

window.ppDeleteEntry = async function(gIdx, name, idx) {
  if (!confirm('بۇ خاتىرىنى ئۆچۈرەمسىز؟')) return;
  STATE.entries.splice(gIdx,1);
  await saveEntries();
  renderParticipant(name, idx);
};

window.submitReading = async function(name, idx) {
  const pages = parseInt(document.getElementById('pp-pages').value);
  const date = document.getElementById('pp-date').value;
  if (!pages||pages<1) { showPPMsg('بەت سانىنى كىرگۈزۈڭ','warn'); return; }
  const cycle = STATE.activeCycle;
  const existing = STATE.entries.findIndex(e=>e.person===name&&e.date===date&&(!cycle||e.cycleId===cycle?.id));
  if (existing>=0) STATE.entries.splice(existing,1);
  STATE.entries.push({person:name, pages, date, cycleId:cycle?.id||'free'});
  await saveEntries();
  showPPMsg(pages+' بەت مۇۋەپپەقىيەتلىك ساقلاندى!','success');
  setTimeout(()=>renderParticipant(name,idx),700);
};

function showPPMsg(txt,type) {
  const el = document.getElementById('pp-msg');
  if (!el) return;
  el.style.display='block';
  el.style.color = type==='success'?'#3B6D11':'#993C1D';
  el.textContent=txt;
}

let pinEntry='';
window.openAdminPin = function() { renderPinScreen(); show('view-admin-pin'); };

function renderPinScreen() {
  pinEntry='';
  setHTML('view-admin-pin',`<div style="display:flex;flex-direction:column;align-items:center;padding:3rem 1rem;gap:1rem">
    <div style="font-size:18px;font-weight:600;color:#534AB7">باشقۇرغۇچى كىرىش</div>
    <div style="font-size:13px;color:#888">PIN كودىنى كىرگۈزۈڭ</div>
    <div style="display:flex;gap:12px;margin:1rem 0">
      ${[0,1,2,3].map(i=>`<div id="pd${i}" style="width:14px;height:14px;border-radius:50%;background:#eee;border:0.5px solid #ccc;transition:background .15s"></div>`).join('')}
    </div>
    <div id="pin-error" style="font-size:13px;color:#A32D2D;height:18px"></div>
    <div style="display:grid;grid-template-columns:repeat(3,64px);gap:8px">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`<button onclick="pinTap('${k}')"
        style="width:64px;height:64px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:18px;font-weight:500;cursor:pointer;${k===''?'visibility:hidden':''}">${k}</button>`).join('')}
    </div>
    <button onclick="goHome()" style="background:none;border:0.5px solid #ddd;border-radius:8px;padding:7px 18px;font-size:13px;color:#888;cursor:pointer">بەكىتىش</button>
  </div>`);
}

window.pinTap = function(k) {
  if (k==='⌫') { pinEntry=pinEntry.slice(0,-1); }
  else if (pinEntry.length<4&&k!=='') { pinEntry+=k; }
  for (let i=0;i<4;i++) {
    const d=document.getElementById('pd'+i);
    if(d){d.style.background=i<pinEntry.length?'#534AB7':'#eee';d.style.borderColor=i<pinEntry.length?'#534AB7':'#ccc';}
  }
  if (pinEntry.length===4) {
    if (pinEntry===ADMIN_PIN) { show('view-admin'); renderAdmin('members'); }
    else {
      document.getElementById('pin-error').textContent='PIN خاتا. قايتا سىناڭ.';
      pinEntry='';
      for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d){d.style.background='#eee';d.style.borderColor='#ccc';}}
    }
  }
};

// ── ADMIN ──────────────────────────────────────────────────────────────────────
function renderAdmin(tab) {
  const tabs    = ['members','entries','cycle','summary','leaderboard','archive','export'];
  const labels  = ['ئەزالار','خاتىرىلەر','چەمبەر','خۇلاسە','رەتلىك','ئارخىپ','چىقىرىش'];
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div style="font-size:18px;font-weight:600;color:#534AB7">باشقۇرغۇچى تاختىسى</div>
    <button onclick="goHome()" style="background:none;border:0.5px solid #ddd;border-radius:8px;padding:7px 14px;font-size:13px;color:#888;cursor:pointer">&#8592; باش بەت</button>
  </div>
  <div style="display:flex;gap:2px;flex-wrap:wrap;margin-bottom:1.5rem;border-bottom:0.5px solid #eee">`;
  tabs.forEach((t,i)=>html+=`<button onclick="renderAdmin('${t}')"
    style="padding:8px 12px;font-size:13px;cursor:pointer;border:none;background:transparent;color:${t===tab?'#534AB7':'#888'};border-bottom:${t===tab?'2px solid #534AB7':'2px solid transparent'};margin-bottom:-1px;font-weight:${t===tab?'500':'400'}">${labels[i]}</button>`);
  html+=`</div><div id="admin-body"></div>`;
  setHTML('view-admin',html);
  renderAdminTab(tab);
}

function renderAdminTab(tab) {
  const el = document.getElementById('admin-body');
  if (!el) return;
  const map = {members:tabMembers, entries:tabEntries, cycle:tabCycle, summary:tabSummary, leaderboard:tabLeaderboard, archive:tabArchive, export:tabExport};
  el.innerHTML = (map[tab]||tabMembers)();
}

// Members
function tabMembers() {
  const cycle = STATE.activeCycle;
  let html=`<div style="background:#fff;border:0.5px solid #eee;border-radius:14px;padding:1.25rem">
    <div style="font-size:14px;font-weight:500;margin-bottom:12px">ئەزا قوشۇش</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px">
      <div style="flex:1;min-width:160px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">ئىسىم</label>

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────────
window.exportExcel = function() {
  const wb = XLSX.utils.book_new();
  const headerStyle = {fill:{fgColor:{rgb:'534AB7'}},font:{color:{rgb:'FFFFFF'},bold:true},alignment:{horizontal:'center'}};
  const allCycles = [];
  if (STATE.activeCycle) allCycles.push({...STATE.activeCycle,entries:STATE.entries.filter(e=>e.cycleId===STATE.activeCycle.id)});
  STATE.cycles.slice().reverse().forEach(c=>allCycles.push(c));

  // Summary sheet
  const sumData=[['چەمبەر','ئىسىم','كىتاب','ئومۇمىي بەت','ئاكتىپ كۈن','ئوتتۇرا']];
  allCycles.forEach(c=>{
    const ents=c.entries||[];
    STATE.persons.forEach(p=>{
      const pe=ents.filter(e=>e.person===p.name);
      const total=pe.reduce((s,e)=>s+e.pages,0);
      const days=new Set(pe.map(e=>e.date)).size;
      sumData.push([c.name,p.name,p.book||'',total,days,days?Math.round(total/days):0]);
    });
  });
  const sumWS=XLSX.utils.aoa_to_sheet(sumData);
  sumWS['!cols']=[{wch:22},{wch:18},{wch:22},{wch:14},{wch:12},{wch:12}];
  ['A1','B1','C1','D1','E1','F1'].forEach(c=>{if(sumWS[c])sumWS[c].s=headerStyle;});
  XLSX.utils.book_append_sheet(wb,sumWS,'خۇلاسە');

  // Per-cycle sheets
  allCycles.forEach((c,ci)=>{
    const ents=c.entries||[];
    const data=[['ئىسىم','كىتاب','كۈن','بەت سانى']];
    ents.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
      const person=STATE.persons.find(p=>p.name===e.person);
      data.push([e.person,person?.book||'',e.date,e.pages]);
    });
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:18},{wch:22},{wch:14},{wch:10}];
    ['A1','B1','C1','D1'].forEach(cell=>{if(ws[cell])ws[cell].s=headerStyle;});
    for(let r=1;r<data.length;r++){
      const pIdx=STATE.persons.findIndex(p=>p.name===data[r][0]);
      const pl=pal(pIdx>=0?pIdx:r);
      const rc=pl.avatar.replace('#',''), tc=pl.avatarText.replace('#','');
      ['A','B','C','D'].forEach(col=>{const cell=col+(r+1);if(ws[cell])ws[cell].s={fill:{fgColor:{rgb:rc}},font:{color:{rgb:tc}}};});
    }
    XLSX.utils.book_append_sheet(wb,ws,(c.name||'چەمبەر '+(ci+1)).slice(0,28));
  });

  // Leaderboard sheet
  if(STATE.activeCycle){
    const lbData=[['ئورۇن','ئىسىم','كىتاب','ئومۇمىي بەت','ئاكتىپ كۈن','ئوتتۇرا']];
    STATE.persons.map((p,i)=>{
      const pe=STATE.entries.filter(e=>e.person===p.name&&e.cycleId===STATE.activeCycle.id);
      const total=pe.reduce((s,e)=>s+e.pages,0);
      const days=new Set(pe.map(e=>e.date)).size;
      return{name:p.name,book:p.book||'',total,days,avg:days?Math.round(total/days):0,i};
    }).sort((a,b)=>b.total-a.total).forEach((s,rank)=>{
      lbData.push([rank+1,s.name,s.book,s.total,s.days,s.avg]);
    });
    const lbWS=XLSX.utils.aoa_to_sheet(lbData);
    lbWS['!cols']=[{wch:6},{wch:18},{wch:22},{wch:12},{wch:12},{wch:10}];
    ['A1','B1','C1','D1','E1','F1'].forEach(c=>{if(lbWS[c])lbWS[c].s=headerStyle;});
    lbData.slice(1).forEach((_,rank)=>{
      const pIdx=STATE.persons.findIndex(p=>p.name===lbData[rank+1][1]);
      const pl=pal(pIdx>=0?pIdx:rank);
      const rc=pl.avatar.replace('#',''),tc=pl.avatarText.replace('#','');
      ['A','B','C','D','E','F'].forEach(col=>{const cell=col+(rank+2);if(lbWS[cell])lbWS[cell].s={fill:{fgColor:{rgb:rc}},font:{color:{rgb:tc}}};});
    });
    XLSX.utils.book_append_sheet(wb,lbWS,'رەتلىك');
  }

  XLSX.writeFile(wb,'kitab-okux-hatirisi.xlsx');
};
